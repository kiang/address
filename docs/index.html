<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>掃街地圖</title>
    <meta name="description" content="各縣市行政區門牌掃街路線規劃，將門牌座標以最短路徑串連，每段約一小時自行車可完成的距離">
    <meta name="keywords" content="掃街,門牌,路線規劃,自行車,地圖">
    <meta property="og:title" content="掃街地圖">
    <meta property="og:description" content="各縣市行政區門牌掃街路線，每段路線約15公里，騎自行車約一小時可完成">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="map"></div>
    <div id="panel">
        <div id="panel-header">
            <span>掃街地圖</span>
            <span id="panel-toggle">&#x25BC;</span>
        </div>
        <div id="panel-search">
            <input type="text" id="search-input" placeholder="搜尋縣市或區域..." />
        </div>
        <div id="panel-body"></div>
    </div>
    <div id="segment-nav">
        <button id="btn-prev">&#x25C0; 上一段</button>
        <div id="segment-info"></div>
        <button id="btn-next">下一段 &#x25B6;</button>
    </div>
    <div id="tracking-bar">
        <button id="btn-track-start">開始掃街</button>
        <button id="btn-track-stop" style="display:none">停止掃街</button>
        <button id="btn-track-clear" style="display:none">清除紀錄</button>
        <button id="btn-track-export" style="display:none">匯出</button>
        <div id="tracking-stats"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="leaflet-decorator.js"></script>
    <script src="data.js"></script>
    <script src="tracking.js"></script>
    <script src="app.js"></script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FJ1JR851SJ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-FJ1JR851SJ');
    </script>
</body>
</html>
