    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 0; }
        #panel {
            position: absolute; top: 10px; left: 10px; z-index: 1000;

            width: 280px; max-height: calc(100vh - 20px); display: flex; flex-direction: column;

        #panel-header {
            padding: 12px 14px; border-bottom: 1px solid #e0e0e0;
            font-size: 15px; font-weight: 600; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
        }
        #panel-header:hover { background: #f5f5f5; }
        #panel-toggle { font-size: 12px; color: #888; }
        #panel-body { overflow-y: auto; flex: 1; }
        .city-group-header {
            padding: 8px 14px; background: #f0f0f0; font-size: 14px; font-weight: 600;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #e0e0e0; position: sticky; top: 0; z-index: 1;
        }
        .city-group-header:hover { background: #e5e5e5; }
        .city-group-header .toggle { font-size: 10px; color: #888; }
        .city-group-header.active { background: #d0e0f0; }
        .district-item {
            padding: 8px 14px 8px 28px; cursor: pointer; border-bottom: 1px solid #f0f0f0;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 13px;

        .district-item .meta { color: #888; font-size: 11px; }
        .city-districts { display: none; }

        #segment-nav {

    <script>
        L.polylineDecorator = function(paths, options) { return new L.PolylineDecorator(paths, options); };
        L.PolylineDecorator = L.FeatureGroup.extend({
            options: { patterns: [] },
            initialize: function(paths, options) {
                L.FeatureGroup.prototype.initialize.call(this);
                L.setOptions(this, options);
                this._paths = paths;
            },
            onAdd: function(map) {
                this._map = map;
                this._draw();
                map.on('zoomend', this._draw, this);
            },
            onRemove: function(map) {
                this.clearLayers();
                map.off('zoomend', this._draw, this);
            },
            _draw: function() {
                this.clearLayers();
                var latlngs = this._paths instanceof L.Polyline ? this._paths.getLatLngs() : this._paths;
                if (!latlngs || latlngs.length < 2) return;
                this.options.patterns.forEach(function(pattern) {
                    this._drawPattern(latlngs, pattern);
                }, this);
            },
            _drawPattern: function(latlngs, pattern) {
                var offset = pattern.offset || '50%';
                var repeat = pattern.repeat || 100;
                var symbol = pattern.symbol;
                if (!symbol) return;
                var totalDist = 0;
                var segDists = [];
                for (var i = 1; i < latlngs.length; i++) {
                    var d = this._map.latLngToLayerPoint(latlngs[i]).distanceTo(
                        this._map.latLngToLayerPoint(latlngs[i-1]));
                    segDists.push(d);
                    totalDist += d;
                }
                var repeatPx = typeof repeat === 'string' && repeat.endsWith('%')
                    ? totalDist * parseFloat(repeat) / 100 : repeat;
                if (repeatPx < 1) repeatPx = 1;
                var startOffset = typeof offset === 'string' && offset.endsWith('%')
                    ? totalDist * parseFloat(offset) / 100 : offset;
                for (var dist = startOffset; dist < totalDist; dist += repeatPx) {
                    var pos = this._getPointAtDistance(latlngs, segDists, dist);
                    if (pos) {
                        var marker = symbol.buildSymbol(pos.pt, pos.angle, this._map);
                        if (marker) this.addLayer(marker);
                    }
                }
            },
            _getPointAtDistance: function(latlngs, segDists, targetDist) {
                var accum = 0;
                for (var i = 0; i < segDists.length; i++) {
                    if (accum + segDists[i] >= targetDist) {
                        var ratio = (targetDist - accum) / segDists[i];
                        var p1 = this._map.latLngToLayerPoint(latlngs[i]);
                        var p2 = this._map.latLngToLayerPoint(latlngs[i+1]);
                        var pt = L.point(p1.x + (p2.x - p1.x) * ratio, p1.y + (p2.y - p1.y) * ratio);
                        var angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
                        return { pt: this._map.layerPointToLatLng(pt), angle: angle };
                    }
                    accum += segDists[i];
                }
                return null;
            }
        });

        L.Symbol = L.Symbol || {};
        L.Symbol.arrowHead = function(options) { return new L.Symbol.ArrowHead(options); };
        L.Symbol.ArrowHead = L.Class.extend({
            options: { pixelSize: 14, headAngle: 50, pathOptions: {} },
            initialize: function(options) { L.setOptions(this, options); },
            buildSymbol: function(latlng, angle, map) {
                var s = this.options.pixelSize;
                var ha = this.options.headAngle * Math.PI / 180 / 2;
                var center = map.latLngToLayerPoint(latlng);
                var tip = L.point(center.x + s * 0.4 * Math.cos(angle), center.y + s * 0.4 * Math.sin(angle));
                var p1 = L.point(center.x - s * Math.cos(angle - ha), center.y - s * Math.sin(angle - ha));
                var p2 = L.point(center.x - s * Math.cos(angle + ha), center.y - s * Math.sin(angle + ha));
                return L.polygon([
                    map.layerPointToLatLng(tip),
                    map.layerPointToLatLng(p1),
                    map.layerPointToLatLng(p2)
                ], L.extend({ stroke: true, weight: 1, fill: true, fillOpacity: 0.85 }, this.options.pathOptions));
            }
        });
    </script>

        const cityOrder = ["taipei","new_taipei","taoyuan","hsinchu_city","hsinchu_county","miaoli","taichung","changhua","yunlin","chiayi_county","tainan","kaohsiung","pingtung","taitung","hualien","penghu","kinmen"];

        const map = L.map('map').setView([23.7, 120.9], 8);
        L.tileLayer('https://wmts.nlsc.gov.tw/wmts/EMAP/default/GoogleMapsCompatible/{z}/{y}/{x}', {
            attribution: '&copy; 內政部國土測繪中心',
            maxZoom: 20
        }).addTo(map);

        let currentData = null;
        let currentSegment = 0;
        let currentCity = null;
        let currentCode = null;
        let segmentLayers = [];
        let allSegmentsLayer = null;

        const panelBody = document.getElementById('panel-body');
        const panelHeader = document.getElementById('panel-header');
        const panel = document.getElementById('panel');
        const segNav = document.getElementById('segment-nav');
        const segInfo = document.getElementById('segment-info');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');

        panelHeader.addEventListener('click', () => {
            panel.classList.toggle('collapsed');
            document.getElementById('panel-toggle').textContent =
                panel.classList.contains('collapsed') ? '▶' : '▼';
        });

        cityOrder.forEach(cityKey => {
            const cityLabel = cityNames[cityKey];
            const codes = cityDistricts[cityKey];

            const header = document.createElement('div');
            header.className = 'city-group-header';
            header.dataset.city = cityKey;
            header.innerHTML = `<span>${cityLabel} (${codes.length})</span><span class="toggle">▶</span>`;

            const container = document.createElement('div');
            container.className = 'city-districts';
            container.dataset.city = cityKey;

            codes.forEach(code => {
                const item = document.createElement('div');
                item.className = 'district-item';
                item.dataset.code = code;
                item.dataset.city = cityKey;
                item.innerHTML = `<span>${districtNames[code] || code}</span><span class="meta" id="meta-${code}"></span>`;
                item.addEventListener('click', () => loadDistrict(cityKey, code));
                container.appendChild(item);
            });

            header.addEventListener('click', () => {
                const isOpen = container.classList.contains('open');
                container.classList.toggle('open');
                header.querySelector('.toggle').textContent = isOpen ? '▶' : '▼';
            });

            panelBody.appendChild(header);
            panelBody.appendChild(container);
        });

        document.getElementById('search-input').addEventListener('input', function() {
            const q = this.value.trim().toLowerCase();
            document.querySelectorAll('.city-group-header').forEach(header => {
                const cityKey = header.dataset.city;
                const cityLabel = cityNames[cityKey];
                const container = panelBody.querySelector(`.city-districts[data-city="${cityKey}"]`);
                const codes = cityDistricts[cityKey];

                if (!q) {
                    header.style.display = '';
                    container.style.display = '';
                    container.classList.remove('open');
                    header.querySelector('.toggle').textContent = '▶';
                    container.querySelectorAll('.district-item').forEach(item => item.style.display = '');
                    return;
                }

                const cityMatch = cityLabel.includes(q);
                let anyDistrictMatch = false;
                codes.forEach(code => {
                    const name = districtNames[code] || code;
                    const match = cityMatch || name.toLowerCase().includes(q) || code.includes(q);
                    const item = container.querySelector(`[data-code="${code}"]`);
                    if (item) item.style.display = match ? '' : 'none';
                    if (match) anyDistrictMatch = true;
                });

                const show = cityMatch || anyDistrictMatch;
                header.style.display = show ? '' : 'none';
                container.style.display = show ? '' : 'none';
                if (show && q) {
                    container.classList.add('open');
                    header.querySelector('.toggle').textContent = '▼';
                }
            });
        });

        function clearMap() {
            segmentLayers.forEach(l => map.removeLayer(l));
            segmentLayers = [];
            if (allSegmentsLayer) {
                map.removeLayer(allSegmentsLayer);
                allSegmentsLayer = null;
            }
        }

        async function loadDistrict(cityKey, code) {
            document.querySelectorAll('.district-item').forEach(el => {
                el.classList.toggle('active', el.dataset.code === code);
            });
            document.querySelectorAll('.city-group-header').forEach(el => {
                el.classList.toggle('active', el.dataset.city === cityKey);
            });

            const container = panelBody.querySelector(`.city-districts[data-city="${cityKey}"]`);
            if (container && !container.classList.contains('open')) {
                container.classList.add('open');
                const header = panelBody.querySelector(`.city-group-header[data-city="${cityKey}"]`);
                if (header) header.querySelector('.toggle').textContent = '▼';
            }

            clearMap();
            currentCity = cityKey;
            currentCode = code;

            const resp = await fetch(`output/${cityKey}/${code}.geojson`);
            currentData = await resp.json();
            currentSegment = 0;

            allSegmentsLayer = L.layerGroup().addTo(map);
            currentData.features.forEach((feat, i) => {
                const coords = feat.geometry.coordinates.map(c => [c[1], c[0]]);
                const line = L.polyline(coords, { color: '#999', weight: 2, opacity: 0.5 });
                line.on('click', () => showSegment(i));
                line.addTo(allSegmentsLayer);
            });

            const allBounds = allSegmentsLayer.getLayers().reduce((bounds, layer) => {
                return bounds.extend(layer.getBounds());
            }, L.latLngBounds([]));
            map.fitBounds(allBounds, { padding: [50, 50] });

            segNav.style.display = 'flex';
            showSegment(0);

            const metaEl = document.getElementById(`meta-${code}`);
            if (metaEl && !metaEl.textContent) {
                metaEl.textContent = `${currentData.features.length} 段`;
            }
        }

        function showSegment(idx) {
            currentSegment = idx;
            const total = currentData.features.length;
            const feat = currentData.features[idx];

            segmentLayers.forEach(l => map.removeLayer(l));
            segmentLayers = [];

            allSegmentsLayer.getLayers().forEach((layer, i) => {
                layer.setStyle({
                    color: '#999',
                    weight: i === idx ? 0 : 2,
                    opacity: i === idx ? 0 : 0.4
                });
            });

            const coords = feat.geometry.coordinates.map(c => [c[1], c[0]]);

            const halo = L.polyline(coords, { color: '#fff', weight: 10, opacity: 0.9 }).addTo(map);
            segmentLayers.push(halo);

            const line = L.polyline(coords, { color: '#1a3a6b', weight: 5, opacity: 0.9 }).addTo(map);
            segmentLayers.push(line);

            const arrows = L.polylineDecorator(line, {
                patterns: [{
                    offset: 20, repeat: 80,
                    symbol: L.Symbol.arrowHead({
                        pixelSize: 20, headAngle: 45,
                        pathOptions: { color: '#fff', fillColor: '#1a3a6b', weight: 2, opacity: 1, fillOpacity: 1 }
                    })
                }]
            }).addTo(map);
            segmentLayers.push(arrows);

            const startMarker = L.circleMarker(coords[0], {
                radius: 7, color: '#fff', fillColor: '#2ecc40', fillOpacity: 1, weight: 2
            }).bindTooltip('起點', { permanent: false }).addTo(map);
            segmentLayers.push(startMarker);

            const endMarker = L.circleMarker(coords[coords.length - 1], {
                radius: 7, color: '#fff', fillColor: '#e74c3c', fillOpacity: 1, weight: 2
            }).bindTooltip('終點', { permanent: false }).addTo(map);
            segmentLayers.push(endMarker);

            map.fitBounds(line.getBounds(), { padding: [60, 60] });

            const distName = districtNames[feat.properties.district] || feat.properties.district;
            const cityLabel = currentCity ? cityNames[currentCity] : '';
            segInfo.innerHTML = `<strong>${cityLabel} ${distName}</strong><br>第 ${idx + 1} / ${total} 段 (${feat.properties.km} km)`;

            btnPrev.disabled = idx === 0;
            btnNext.disabled = idx === total - 1;
        }

        btnPrev.addEventListener('click', () => {
            if (currentSegment > 0) showSegment(currentSegment - 1);
        });
        btnNext.addEventListener('click', () => {
            if (currentSegment < currentData.features.length - 1) showSegment(currentSegment + 1);
        });

        // Handle URL hash for direct linking
        function loadFromHash() {
            const hash = window.location.hash.slice(1);
            if (!hash) return;
            const parts = hash.split('/');
            if (parts.length >= 2) {
                const cityKey = parts[0];
                const code = parts[1];
                if (cityDistricts[cityKey] && cityDistricts[cityKey].includes(code)) {
                    loadDistrict(cityKey, code);
                }
            }
        }
        loadFromHash();
    </script>
